<!DOCTYPE html>
<html lang="en" class="h-full">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>SSTRACKER</title>
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<meta name="theme-color" content="#05050A" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="SSTRACKER" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<meta name="mobile-web-app-capable" content="yes" />
		<!-- CSP: production uses Content-Security-Policy-Report-Only via Firebase Hosting (firebase.json). Intentionally no meta CSP here so Vite dev HMR is not blocked. -->
		<!-- COPPA 2.0 / Phase 2 Epic 3 — Teen 13-16 Ad-Block: any new third-party SDK (analytics, ad pixels, session-recording tools) MUST be loaded via loadThirdPartyScript() from $lib/stores/teenAdGuard.svelte.js instead of direct <script> injection. Direct injection bypasses the teen 13-16 suppression guard. -->
		<!-- Geist Mono — Vanguard data / mono typographic token -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
		<!-- Phosphor icons CDN (lightweight icon font, not a bundled library) -->
		<script src="https://unpkg.com/@phosphor-icons/web" defer></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="h-full">
		<div class="sveltekit-body-root">%sveltekit.body%</div>
		<!-- Fixed overlays portaled here avoid body overflow clipping and ec-canvas scroll quirks -->
		<div id="modal-portal-host" class="modal-portal-host" aria-hidden="true"></div>
	</body>
</html>
