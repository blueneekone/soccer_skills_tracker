  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Functions guards (node --test, no Java / no emulator)
  #
  # Runs source-scan guards that confirmed green locally (2026-06-09):
  #   • trackB1–B4: 144 tests / 0 failures
  #   • rlBountyWiring + subscriptionGate: 23 tests / 0 failures
  #   • functionsDeploy guard + codebase deps verify: 58 tests / 0 failures
  #
  # NOTE: test:functions-deploy verifies all codebase node_modules are present,
  # so this job installs all function codebase deps before running it.
  # ─────────────────────────────────────────────────────────────────────────────
  functions-guards:
    name: Functions Guards (node --test)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install Cloud Functions codebase dependencies
        run: |
          for dir in functions functions-core functions-rl functions-commerce functions-compliance functions-integrations functions-platform; do
            npm ci --prefix "$dir"
          done

      - name: Track B domain guards (B1–B4, source-scan)
        run: |
          node --test \
            functions/src/domains/__tests__/trackB1Prescription.guard.test.js \
            functions/src/domains/__tests__/trackB2Cadence.guard.test.js \
            functions/src/domains/__tests__/trackB3Bundle.guard.test.js \
            functions/src/domains/__tests__/trackB4Proof.guard.test.js

      - name: RL bounty + subscription gate guards
        run: |
          node --test \
            functions/__tests__/rlBountyWiring.guard.test.js \
            functions/__tests__/subscriptionGate.test.js

      - name: Functions deploy guard + codebase deps verify
        run: npm run test:functions-deploy

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Firestore emulator rules (G6 core — requires Java)
  #
  # Runs firestoreTenantIsolation.test.ts against a local Firestore emulator.
  # No Firebase credentials or project secrets needed — the project ID
  # `sst-sprint-13-rules` is arbitrary for emulator use only.
  #
  # firebase.json confirms:
  #   emulators.firestore.port = 8080   (test file reads FIRESTORE_EMULATOR_HOST)
  #   firestore.rules = "firestore.rules"  (ruleset under test)
  #
  # The test uses `describe.skipIf(!process.env.FIRESTORE_EMULATOR_HOST)`,
  # so it skips gracefully in the unit job above (no emulator running there).
  # The `emulators:exec` command sets FIRESTORE_EMULATOR_HOST automatically.
  #
  # Cannot be verified locally (no JDK installed on dev machine). Command
  # mirrors the existing `test:firestore-rules` npm script shipped with the repo.
  # ─────────────────────────────────────────────────────────────────────────────
  firestore-rules:
    name: Firestore Emulator Rules (G6)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21 (Temurin) — required by Firestore emulator (firebase-tools 15+)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore emulator rules tests
        run: npm run test:firestore-rules

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4 — E2E Tests (Playwright)
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E tests
        run: npm run test:e2e