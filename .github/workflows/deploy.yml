name: 🚀 VANGUARD — Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Firebase project'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

# Cancel any in-progress run for the same branch so stale builds never
# deploy over a newer commit.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  # workflow_dispatch dev → sports-skill-tracker-dev; prod or push-to-main → soccer-skills-tracker (A-04)
  DEPLOY_TARGET: ${{ github.event.inputs.environment == 'dev' && 'dev' || 'prod' }}
  VITE_USE_PROD: ${{ github.event.inputs.environment != 'dev' && 'true' || 'false' }}
  FIREBASE_PROJECT_ID: ${{ github.event.inputs.environment == 'dev' && 'sports-skill-tracker-dev' || 'soccer-skills-tracker' }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Validate (type-check, lint, security rules)
  # ─────────────────────────────────────────────────────────────────────────
  validate:
    name: ✅ Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check (svelte-check)
        # Fail the pipeline on errors; allow existing pre-existing warnings.
        run: npm run check
        env:
          VITE_USE_PROD: ${{ env.VITE_USE_PROD }}

      - name: Validate Firestore security rules
        run: npx firebase-tools deploy --only firestore:rules --dry-run --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: Validate Storage security rules
        run: npx firebase-tools deploy --only storage --dry-run --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build SvelteKit
        run: npm run build
        env:
          VITE_USE_PROD: ${{ env.VITE_USE_PROD }}
          # Inject any additional VITE_* secrets from GitHub Actions secrets
          VITE_FCM_VAPID_KEY: ${{ secrets.VITE_FCM_VAPID_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sveltekit-build
          # @sveltejs/adapter-static outputs to `build/`
          path: build/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy (sequential: Rules → codebases → default → Hosting)
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🔥 Deploy (${{ env.FIREBASE_PROJECT_ID }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    environment:
      name: ${{ env.DEPLOY_TARGET == 'dev' && 'development' || 'production' }}
      url: ${{ env.DEPLOY_TARGET == 'dev' && 'https://sstracker.app' || 'https://soccer.sstracker.app' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install frontend dependencies (for firebase-tools)
        run: npm ci

      - name: Install Cloud Functions dependencies (all codebases)
        run: |
          npm ci
          for dir in functions functions-core functions-rl functions-commerce functions-compliance functions-integrations functions-platform; do
            npm ci --prefix "$dir"
          done

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: build/

      # Step 1: Security rules first — if rules are broken, abort before
      # touching Hosting or Functions.
      - name: Deploy Firestore security rules
        run: npx firebase-tools deploy --only firestore:rules --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: Deploy Storage security rules
        run: npx firebase-tools deploy --only storage --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      # Step 2: Cloud Functions — one codebase at a time (DEPLOY-N)
      - name: Deploy Functions (core → rl → commerce → compliance → integrations → platform → default)
        run: |
          set -e
          PROJECT=${{ env.FIREBASE_PROJECT_ID }}
          for codebase in core rl commerce compliance integrations platform default; do
            echo "Deploying functions codebase: ${codebase}"
            npx firebase-tools deploy --only "functions:${codebase}" --project "${PROJECT}"
          done
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}
          FUNCTIONS_DISCOVERY_TIMEOUT: '120'

      # Step 3: Hosting (only after Functions are live to avoid 404 on new CF routes)
      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ env.FIREBASE_PROJECT_ID }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_CI_TOKEN }}

      - name: 🎉 Deployment complete
        run: |
          if [ "${{ env.DEPLOY_TARGET }}" = "dev" ]; then
            echo "VANGUARD deployed to sports-skill-tracker-dev (development)"
            echo "Hosting: https://sstracker.app"
            {
              echo "## Deploy complete — development"
              echo ""
              echo "- **Project:** \`sports-skill-tracker-dev\`"
              echo "- **Hosting:** https://sstracker.app"
              echo "- **Commit:** \`${{ github.sha }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "VANGUARD deployed to soccer-skills-tracker (production)"
            echo "Hosting: https://soccer.sstracker.app"
            {
              echo "## Deploy complete — production"
              echo ""
              echo "- **Project:** \`soccer-skills-tracker\`"
              echo "- **Hosting:** https://soccer.sstracker.app"
              echo "- **Commit:** \`${{ github.sha }}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "Commit: ${{ github.sha }}"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Post-deploy smoke (dev only, when FIREBASE_CI_TOKEN is configured)
  # ─────────────────────────────────────────────────────────────────────────
  smoke-dev:
    name: 🧪 Smoke (dev)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy
    if: env.DEPLOY_TARGET == 'dev' && secrets.FIREBASE_CI_TOKEN != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies (smoke export guard)
        run: |
          for dir in functions functions-core functions-rl functions-commerce functions-compliance functions-integrations functions-platform; do
            npm ci --prefix "$dir"
          done

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: sveltekit-build
          path: build/

      - name: Run post-deploy smoke
        run: npm run smoke:dev
        env:
          SMOKE_FIREBASE_PROJECT: sports-skill-tracker-dev
          SMOKE_HOSTING_URL: https://sstracker.app
