name: Antigravity Autonomous QA Conveyor Belt

# This action listens for Jules opening a Pull Request
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-cro-swarm-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Required for Svelte 5 / Firebase tools)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Antigravity CLI
        run: |
          # Install the Antigravity CLI for Linux headless execution
          curl -sL https://antigravity.google/install.sh | bash
          
      - name: Execute Master E2E Swarm Audit
        env:
          # Injecting your secure tokens so the agent can operate headless
          AGY_API_KEY: ${{ secrets.AGY_API_KEY }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # The -p flag executes the workflow non-interactively in the pipeline
          agy -p .agents/workflows/master-e2e-swarm-audit.md

      - name: Upload CRO Audit Artifacts to PR
        uses: actions/upload-artifact@v4
        with:
          name: cro-visual-audit-proof
          # Uploads the MP4 recordings and screenshots generated by the CRO
          path: /audit-artifacts/